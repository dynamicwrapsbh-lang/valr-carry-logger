name: hourly-carry-logger

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: logger
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python logger.py
      - run: python paper_trader.py
      - name: Commit logs and state
        run: |
          git config user.name "logger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "log $(date -u +'%Y-%m-%dT%H:%M')" || echo "nothing new"
          git push
